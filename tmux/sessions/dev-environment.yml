name: dev-environment
root: <%= ENV.fetch("DEV_ENV_PROJECT_ROOT") %>
attach: false

windows:
  - editor:
      layout: main-vertical
      panes:
        - nvim .
        - git status --short
  - docs:
      layout: main-vertical
      panes:
        - nvim docs
        - clear
  - shell:
      panes:
        - clear
